# =============================================================================
# Enwealth E-Board Portal — Nginx Site Configuration (Bare VPS)
# =============================================================================
# Drop-in config for /etc/nginx/sites-available/enwealth
#
# Install:
#   sudo cp deploy/nginx-site.conf /etc/nginx/sites-available/enwealth
#   sudo ln -s /etc/nginx/sites-available/enwealth /etc/nginx/sites-enabled/enwealth
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates via Certbot (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Replace every occurrence of "yourdomain.com" with your real domain.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zone — defined at http context level.
# In /etc/nginx/nginx.conf (or in a conf.d include) add:
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# If you prefer to keep everything self-contained, uncomment the line below
# and move it to /etc/nginx/conf.d/rate_limit.conf instead (http context only).
# ---------------------------------------------------------------------------
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ---------------------------------------------------------------------------
# Upstream — Gunicorn WSGI server running on localhost
# ---------------------------------------------------------------------------
upstream django {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

# =============================================================================
# Server block 1 — HTTP (port 80)
# Redirect all plain-HTTP traffic to HTTPS permanently.
# =============================================================================
server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt / ACME HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Server block 2 — HTTPS (port 443)
# =============================================================================
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name yourdomain.com www.yourdomain.com;

    # -------------------------------------------------------------------------
    # SSL certificates
    # Certbot will auto-populate these lines when you run:
    #   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    # Alternatively set the paths manually:
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # SSL protocol & cipher hardening (belt-and-suspenders if Certbot options
    # file does not already set these)
    # -------------------------------------------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # -------------------------------------------------------------------------
    # Logging — goes to the standard Nginx log directory
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/enwealth_access.log;
    error_log  /var/log/nginx/enwealth_error.log warn;

    # -------------------------------------------------------------------------
    # Upload size limit — allow PDF uploads up to 25 MB
    # -------------------------------------------------------------------------
    client_max_body_size 25M;

    # -------------------------------------------------------------------------
    # Proxy timeouts — match Gunicorn's timeout (120 s)
    # -------------------------------------------------------------------------
    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Security response headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;

    # -------------------------------------------------------------------------
    # Static files
    # Served directly by Nginx from the project's staticfiles/ directory.
    # Run `python manage.py collectstatic` before reloading Nginx.
    # -------------------------------------------------------------------------
    location /static/ {
        alias   /var/www/enwealth/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Media files — user-uploaded content (PDFs, documents, etc.)
    # -------------------------------------------------------------------------
    location /media/ {
        alias   /var/www/enwealth/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Prevent browsers from executing uploaded files directly
        add_header Content-Disposition "attachment";
    }

    # -------------------------------------------------------------------------
    # Rate-limit the login endpoint
    # -------------------------------------------------------------------------
    location /auth/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://django;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
    }

    # -------------------------------------------------------------------------
    # All other requests → Django / Gunicorn
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://django;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Support WebSocket upgrades (e.g. Django Channels in future)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # -------------------------------------------------------------------------
    # Custom error pages
    # -------------------------------------------------------------------------
    error_page 404 /404/;
    error_page 500 502 503 504 /500/;
}
