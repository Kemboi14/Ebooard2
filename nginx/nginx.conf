# =============================================================================
# Enwealth E-Board Portal — Nginx Configuration (Docker)
# =============================================================================
# Serves as the reverse proxy in front of Gunicorn (web:8000).
# Place your SSL certificates at:
#   /etc/nginx/ssl/fullchain.pem
#   /etc/nginx/ssl/privkey.pem
# When using Certbot + Docker, bind-mount /etc/letsencrypt → /etc/nginx/ssl.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging format
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide Nginx version from headers

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Rate limiting — protect login endpoint
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # =========================================================================
    # Upstream — Gunicorn WSGI server
    # =========================================================================
    upstream django {
        server web:8000 fail_timeout=0;
        keepalive 32;
    }

    # =========================================================================
    # Server block 1 — HTTP (port 80)
    # Redirect all plain-HTTP traffic to HTTPS permanently.
    # =========================================================================
    server {
        listen      80;
        listen      [::]:80;
        server_name yourdomain.com www.yourdomain.com;

        # Let's Encrypt / ACME HTTP-01 challenge — must be reachable over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Server block 2 — HTTPS (port 443)
    # =========================================================================
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name yourdomain.com www.yourdomain.com;

        # ---------------------------------------------------------------------
        # SSL certificates
        # Replace these paths with your real certificate paths.
        # Certbot (Let's Encrypt) example:
        #   /etc/nginx/ssl/live/yourdomain.com/fullchain.pem
        #   /etc/nginx/ssl/live/yourdomain.com/privkey.pem
        # ---------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ---------------------------------------------------------------------
        # SSL protocol & cipher hardening
        # Supports only TLSv1.2 and TLSv1.3 (TLSv1.0/1.1 are deprecated).
        # ---------------------------------------------------------------------
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout          5s;

        # ---------------------------------------------------------------------
        # Upload size limit — allow PDF uploads up to 25 MB
        # ---------------------------------------------------------------------
        client_max_body_size 25M;

        # ---------------------------------------------------------------------
        # Proxy timeouts — match Gunicorn's --timeout 120
        # ---------------------------------------------------------------------
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        send_timeout          120s;

        # ---------------------------------------------------------------------
        # Security response headers
        # These complement the headers Django itself sets via its security
        # middleware, providing defence-in-depth at the network edge.
        # ---------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                         always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;

        # ---------------------------------------------------------------------
        # Static files — served directly by Nginx with long cache TTL.
        # WhiteNoise injects a content-hash suffix into filenames so
        # "expires 30d" is safe to use.
        # The /staticfiles volume is shared between the web and nginx containers.
        # ---------------------------------------------------------------------
        location /static/ {
            alias   /staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---------------------------------------------------------------------
        # Media files — user-uploaded content (PDFs, documents, etc.)
        # The /media volume is shared between the web and nginx containers.
        # ---------------------------------------------------------------------
        location /media/ {
            alias   /media/;
            expires 7d;
            add_header Cache-Control "public";
            # Prevent direct execution of uploaded files
            add_header Content-Disposition "attachment";
        }

        # ---------------------------------------------------------------------
        # Rate-limit the login endpoint
        # ---------------------------------------------------------------------
        location /auth/login/ {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://django;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect   off;
        }

        # ---------------------------------------------------------------------
        # All other requests → Django / Gunicorn
        # ---------------------------------------------------------------------
        location / {
            proxy_pass         http://django;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            # Support WebSocket upgrades (e.g. Django Channels in future)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Buffer settings
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ---------------------------------------------------------------------
        # Custom error pages (optional — create these templates in Django)
        # ---------------------------------------------------------------------
        error_page 404 /404/;
        error_page 500 502 503 504 /500/;
    }
}
